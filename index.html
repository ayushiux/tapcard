<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>tapcard — Digital Business Card</title>

  <meta property="og:title" content="tapcard — Digital Business Card">
  <meta property="og:description" content="Create your free digital business card in seconds">
  <meta property="og:type" content="website">
  <meta name="theme-color" content="#F5F0EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0EB;
      --card: #FDFAF6;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --accent: #C4A882;
      --accent-dark: #A08860;
      --border: rgba(196, 168, 130, 0.2);
      --shadow: 0 8px 32px rgba(0,0,0,0.08);
      --radius: 24px;
      --red: #D9534F;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100dvh;
      padding: 24px 20px 40px;
    }

    .hidden { display: none !important; }

    /* ── Create Mode ── */
    .create-container {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .create-container.fade-out {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    .create-brand {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      color: var(--text);
      text-align: center;
      margin: 20px 0 6px;
      letter-spacing: -0.5px;
    }
    .create-brand span { color: var(--accent); }
    .create-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .create-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      padding: 28px 24px;
      width: 100%;
    }

    .form-section {
      margin-bottom: 28px;
    }
    .form-section:last-child { margin-bottom: 0; }

    .form-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-group {
      margin-bottom: 14px;
      opacity: 0;
      transform: translateY(12px);
      animation: formIn 0.4s ease forwards;
    }
    .form-group:nth-child(2) { animation-delay: 0.05s; }
    .form-group:nth-child(3) { animation-delay: 0.10s; }
    .form-group:nth-child(4) { animation-delay: 0.15s; }
    .form-group:nth-child(5) { animation-delay: 0.20s; }
    .form-group:nth-child(6) { animation-delay: 0.25s; }
    .form-group:nth-child(7) { animation-delay: 0.30s; }
    .form-group:nth-child(8) { animation-delay: 0.35s; }
    .form-group:nth-child(9) { animation-delay: 0.40s; }
    .form-group:nth-child(10) { animation-delay: 0.45s; }

    @keyframes formIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      opacity: 0.6;
    }
    .form-label .req { color: var(--red); margin-left: 2px; opacity: 1; }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(196,168,130,0.18);
      background: var(--card);
    }
    .form-input::placeholder { color: #c8bfb4; }

    .form-input.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(217,83,79,0.12);
    }
    .form-error {
      font-size: 12px;
      color: var(--red);
      margin-top: 4px;
      display: none;
    }
    .form-error.show { display: block; }

    .linkedin-row {
      position: relative;
    }
    .linkedin-row .form-input { width: 100%; padding-right: 52px; }
    .avatar-preview {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      pointer-events: none;
    }
    .avatar-preview:has(img) {
      border-color: var(--border);
      background: var(--bg);
    }
    .avatar-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .generate-btn {
      width: 100%;
      padding: 16px;
      margin-top: 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(196,168,130,0.35);
    }
    .generate-btn:hover {
      background: var(--accent-dark);
      box-shadow: 0 6px 24px rgba(160,136,96,0.45);
      transform: translateY(-1px);
    }
    .generate-btn:active { transform: scale(0.97) translateY(0); box-shadow: none; }

    /* ── 3D Card Flip ── */
    .card-scene {
      perspective: 1200px;
      width: 100%;
      max-width: 380px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .card-scene.fade-in {
      animation: sceneIn 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }
    @keyframes sceneIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-front, .card-back {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transition: background 0.4s ease;
    }

    .card-front {
      padding: 36px 28px 28px;
      position: relative;
    }

    .card-back {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      min-height: 100%;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 28px;
      overflow: hidden;
      cursor: pointer;
      overflow: hidden;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 6px;
      margin-bottom: 28px;
    }

    .avatar-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 14px;
      border: 3px solid rgba(196,168,130,0.4);
      box-shadow: 0 0 0 4px rgba(196,168,130,0.12), 0 4px 20px rgba(196,168,130,0.3);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.3s;
    }
    .avatar-wrap:hover {
      box-shadow: 0 0 0 5px rgba(196,168,130,0.18), 0 6px 24px rgba(196,168,130,0.4);
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-placeholder { font-size: 28px; font-weight: 600; color: var(--accent); line-height: 1; }

    .card-name {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: -0.3px;
    }
    .card-title-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent-dark);
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .card-tagline {
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      font-family: 'DM Serif Display', serif;
      margin-top: 4px;
      line-height: 1.4;
    }
    .card-location {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 20px;
    }

    /* ── Link rows ── */
    .links { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .link-row {
      height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .link-row:hover {
      background: rgba(196,168,130,0.1);
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(196,168,130,0.15);
      transform: translateY(-1px);
    }
    .link-row:active { transform: translateY(0) scale(0.98); }

    .link-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .link-icon svg { width: 16px; height: 16px; }

    .link-label { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }

    .qr-toggle-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--card);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .qr-toggle-btn:hover { background: rgba(196,168,130,0.15); border-color: var(--accent); }
    .qr-toggle-btn svg { width: 14px; height: 14px; color: var(--muted); }

    .open-link {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 16px; text-decoration: none; flex-shrink: 0;
      cursor: pointer;
    }

    /* ── Card Back ── */
    .back-close {
      position: absolute; top: 16px; left: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.7); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); transition: background 0.15s;
      backdrop-filter: blur(4px);
    }
    .back-close:hover { background: rgba(255,255,255,0.95); }
    .back-close svg { width: 18px; height: 18px; }

    .back-avatar {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--qr-color, var(--border));
      box-shadow: 0 0 0 3px var(--qr-color-alpha, rgba(196,168,130,0.15)), 0 4px 16px rgba(0,0,0,0.1);
      background: var(--bg); margin-bottom: 6px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .back-name {
      font-family: 'DM Serif Display', serif; font-size: 18px;
      color: var(--text); line-height: 1.2; margin-bottom: 2px;
    }
    .back-title-text {
      font-size: 10px; font-weight: 500; color: var(--accent-dark);
      text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 10px;
    }
    .back-platform-icon {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 6px;
    }
    .back-platform-icon svg { width: 28px; height: 28px; }

    .back-platform {
      font-size: 11px; font-weight: 600; color: var(--qr-color, var(--accent-dark));
      text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
      transition: color 0.3s;
    }
    .back-qr {
      border-radius: 16px; padding: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin-bottom: 8px;
      background: var(--qr-bg, #ffffff);
      transition: background 0.35s, box-shadow 0.3s;
    }
    .card.flipped .back-qr { animation: qrPulse 2s ease-in-out 0.8s 1; }
    @keyframes qrPulse {
      0%   { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
      50%  { box-shadow: 0 4px 36px var(--qr-color-alpha, rgba(196,168,130,0.4)); }
      100% { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    }
    .back-qr canvas, .back-qr img { display: block; }
    .back-hint {
      font-size: 12px; color: var(--muted); text-align: center;
      line-height: 1.4; margin-bottom: 10px;
    }
    .back-open {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; background: var(--qr-color, var(--accent)); color: white;
      border-radius: 50px; font-size: 13px; font-weight: 500;
      text-decoration: none; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s, filter 0.2s;
    }
    .back-open:hover { filter: brightness(1.1); }

    .card-back > * {
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34,1.4,0.64,1);
    }
    .card.flipped .card-back > *:nth-child(1) { opacity:1; transform:translateY(0); transition-delay:0.35s; }
    .card.flipped .card-back > *:nth-child(2) { opacity:1; transform:translateY(0); transition-delay:0.40s; }
    .card.flipped .card-back > *:nth-child(3) { opacity:1; transform:translateY(0); transition-delay:0.45s; }
    .card.flipped .card-back > *:nth-child(4) { opacity:1; transform:translateY(0); transition-delay:0.48s; }
    .card.flipped .card-back > *:nth-child(5) { opacity:1; transform:translateY(0); transition-delay:0.52s; }
    .card.flipped .card-back > *:nth-child(6) { opacity:1; transform:translateY(0); transition-delay:0.56s; }
    .card.flipped .card-back > *:nth-child(7) { opacity:1; transform:translateY(0); transition-delay:0.60s; }
    .card.flipped .card-back > *:nth-child(8) { opacity:1; transform:translateY(0); transition-delay:0.64s; }
    .card.flipped .card-back > *:nth-child(9) { opacity:1; transform:translateY(0); transition-delay:0.68s; }
    .card.flipped .card-back > *:nth-child(10) { opacity:1; transform:translateY(0); transition-delay:0.72s; }

    /* ── Save to Contacts ── */
    .vcard-section { margin-bottom: 20px; }
    .vcard-btn {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 13px 18px;
      background: linear-gradient(135deg, rgba(196,168,130,0.15), rgba(196,168,130,0.05));
      border: 1px solid var(--accent); border-radius: 50px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, transform 0.1s;
    }
    .vcard-btn:active { transform: scale(0.97); }
    .vcard-btn:hover { background: rgba(196,168,130,0.2); }
    .vcard-icon {
      width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .vcard-icon svg { width: 16px; height: 16px; color: white; }
    .vcard-text { flex: 1; text-align: left; }
    .vcard-title { font-size: 14px; font-weight: 500; color: var(--text); display: block; }
    .vcard-sub { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }

    /* ── Copy link button on card ── */
    .copy-link-row {
      display: flex;
      gap: 8px;
    }
    .copy-link-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s, transform 0.1s;
      background: var(--accent);
      color: white;
      border: 1px solid var(--accent);
    }
    .copy-link-btn:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .copy-link-btn:active { transform: scale(0.97); }
    .copy-link-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Settings gear on card ── */
    .settings-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: var(--muted);
      opacity: 0.4;
      transition: opacity 0.2s;
      padding: 0;
    }
    .settings-btn:hover { opacity: 0.8; }
    .settings-btn svg { width: 18px; height: 18px; }
    .card.flipped .settings-btn { visibility: hidden; pointer-events: none; }

    /* ── Footer ── */
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.5;
      text-align: center;
    }
    .footer a {
      color: var(--accent-dark);
      text-decoration: none;
      opacity: 1;
    }
    .footer a:hover { text-decoration: underline; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Error state ── */
    .error-container {
      text-align: center;
      padding: 40px 20px;
      max-width: 380px;
    }
    .error-container h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }
    .error-container p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .error-container a {
      display: inline-block;
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- ═══ CREATE MODE ═══ -->
  <div id="createMode" class="create-container hidden">
    <div class="create-brand">tap<span>card</span></div>
    <div class="create-sub">Create your digital business card in seconds</div>

    <div class="create-card">
      <div class="form-section">
        <div class="form-section-title">About you</div>

        <div class="form-group">
          <label class="form-label">Name <span class="req">*</span></label>
          <input class="form-input" id="fName" type="text" placeholder="Your full name" required>
          <div class="form-error" id="fNameError">Name is required</div>
        </div>

        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" id="fTitle" type="text" placeholder="e.g. Product Designer · AI & SaaS">
        </div>

        <div class="form-group">
          <label class="form-label">Tagline</label>
          <input class="form-input" id="fTagline" type="text" placeholder="A short quote or motto">
        </div>

        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" id="fLocation" type="text" placeholder="e.g. SF Bay Area">
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Your links</div>

        <div class="form-group">
          <label class="form-label">LinkedIn</label>
          <div class="linkedin-row">
            <input class="form-input" id="fLinkedin" type="url" placeholder="https://linkedin.com/in/yourprofile" inputmode="url">
            <div class="avatar-preview" id="avatarPreview"></div>
          </div>
        </div>

        <div class="form-group">

  <script>
    // ── Data Layer (compressed with pako deflate) ──────────────────
    function encodeCardData(obj) {
      const clean = {};
      for (const [k, v] of Object.entries(obj)) {
        if (v && typeof v === 'string' && v.trim()) clean[k] = v.trim();
      }
      clean.v = 1;

      // Strip common URL prefixes to save space
      const prefixes = { 'https://www.': '~w', 'https://': '~s', 'http://': '~h' };
      for (const key of ['li', 'tw', 'ig', 'pf', 'p']) {
        if (clean[key]) {
          for (const [prefix, token] of Object.entries(prefixes)) {
            if (clean[key].startsWith(prefix)) {
              clean[key] = token + clean[key].slice(prefix.length);
              break;
            }
          }
        }
      }

      const json = JSON.stringify(clean);
      const compressed = pako.deflateRaw(new TextEncoder().encode(json));
      const b64 = btoa(String.fromCharCode(...compressed));
      return b64.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    function decodeCardData(encoded) {
      try {
        let b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        const binary = atob(b64);

        let json;
        try {
          const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
          json = new TextDecoder().decode(pako.inflateRaw(bytes));
        } catch(e) {
          json = decodeURIComponent(escape(binary));
        }

        const data = JSON.parse(json);
        if (!data.n || typeof data.n !== 'string') return null;

        // Restore URL prefixes
        const tokens = { '~w': 'https://www.', '~s': 'https://', '~h': 'http://' };
        for (const key of ['li', 'tw', 'ig', 'pf', 'p']) {
          if (data[key]) {
            for (const [token, prefix] of Object.entries(tokens)) {
              if (data[key].startsWith(token)) {
                data[key] = prefix + data[key].slice(2);
                break;
              }
            }
          }
        }

        return data;
      } catch(e) { return null; }
    }

    function getMode() {
      const params = new URLSearchParams(window.location.search);
      const d = params.get('d');
      if (!d) return { mode: 'create' };
      const data = decodeCardData(d);
      if (!data) return { mode: 'error' };
      return { mode: 'view', data };
    }

    // ── Avatar helper ─────────────────────────────────────────────
    function getAvatarUrl(data) {
      if (data.p) return data.p;
      if (data.li) {
        const m = data.li.match(/linkedin\.com\/in\/([^/?#]+)/);
        if (m) return `https://unavatar.io/linkedin/${m[1]}`;
      }
      return null;
    }

    function setAvatar(imgEl, wrapEl, data) {
      const url = getAvatarUrl(data);
      if (url) {
        imgEl.src = url;
        imgEl.alt = data.n;
        imgEl.onerror = function() {
          if (this.src.includes('unavatar') && data.p) { this.src = data.p; return; }
          this.style.display = 'none';
          const ph = document.createElement('span');
          ph.className = 'avatar-placeholder';
          ph.textContent = (data.n || '?')[0].toUpperCase();
          wrapEl.appendChild(ph);
        };
        imgEl.style.display = '';
      } else {
        imgEl.style.display = 'none';
        const existing = wrapEl.querySelector('.avatar-placeholder');
        if (!existing) {
          const ph = document.createElement('span');
          ph.className = 'avatar-placeholder';
          ph.textContent = (data.n || '?')[0].toUpperCase();
          wrapEl.appendChild(ph);
        }
      }
    }

    // ── Link row mapping ──────────────────────────────────────────
    const LINK_MAP = {
      li:  { rowId: 'rowLinkedin',  label: 'LinkedIn' },
      tw:  { rowId: 'rowTwitter',   label: 'Twitter / X' },
      pf:  { rowId: 'rowPortfolio', label: 'Portfolio' },
      ig:  { rowId: 'rowInstagram', label: 'Instagram' },
      gh:  { rowId: 'rowGithub',    label: 'GitHub' },
    };

    // ── Render Card ───────────────────────────────────────────────
    let currentData = null;

    function renderCard(data) {
      currentData = data;

      // Hero
      document.getElementById('cardName').textContent = data.n;
      setAvatar(document.getElementById('heroAvatar'), document.getElementById('heroAvatarWrap'), data);

      // Title, tagline, location — hide if empty
      const titleWrap = document.getElementById('cardTitleWrap');
      const taglineWrap = document.getElementById('cardTaglineWrap');
      const locationWrap = document.getElementById('cardLocationWrap');

      if (data.t) { document.getElementById('cardTitle').textContent = data.t; titleWrap.classList.remove('hidden'); }
      else titleWrap.classList.add('hidden');

      if (data.g) { document.getElementById('cardTagline').textContent = `"${data.g}"`; taglineWrap.classList.remove('hidden'); }
      else taglineWrap.classList.add('hidden');

      if (data.l) {
        document.getElementById('cardLocation').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;display:inline-block;vertical-align:-1px;margin-right:3px;opacity:0.6"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${data.l}`;
        locationWrap.classList.remove('hidden');
      }
      else locationWrap.classList.add('hidden');

      // Links
      let hasAnyLink = false;
      for (const [key, { rowId }] of Object.entries(LINK_MAP)) {
        const row = document.getElementById(rowId);
        if (data[key]) {
          row.classList.remove('hidden');
          row.querySelector('.open-link').href = data[key];
          hasAnyLink = true;
        } else {
          row.classList.add('hidden');
        }
      }
      document.getElementById('cardDivider').classList.toggle('hidden', !hasAnyLink);

      // Back face
      document.getElementById('backName').textContent = data.n;
      document.getElementById('backTitle').textContent = data.t || '';
      setAvatar(document.getElementById('backAvatar'), document.getElementById('backAvatar').parentElement, data);

      // OG tags
      document.title = `${data.n}${data.t ? ' — ' + data.t : ''} | tapcard`;

      // Bind link row clicks
      bindLinkRows();
    }

    // ── Card flip ─────────────────────────────────────────────────
    const card = document.getElementById('card');
    const backQr = document.getElementById('backQr');
    const backPlatform = document.getElementById('backPlatform');
    const backHint = document.getElementById('backHint');
    const backOpen = document.getElementById('backOpen');
    let activeQR = null;

    // Platform brand colors for QR backgrounds
    const PLATFORM_COLORS = {
      'LinkedIn':     { bg: '#EBF4FF', accent: '#0A66C2', alpha: 'rgba(10,102,194,0.25)' },
      'Twitter / X':  { bg: '#F7F7F7', accent: '#000000', alpha: 'rgba(0,0,0,0.18)' },
      'Instagram':    { bg: '#FDF0F8', accent: '#C13584', alpha: 'rgba(193,53,132,0.25)' },
      'Portfolio':    { bg: '#FBF7F2', accent: '#A08860', alpha: 'rgba(160,136,96,0.3)' },
      'GitHub':       { bg: '#F3F4F6', accent: '#24292F', alpha: 'rgba(36,41,47,0.22)' },
    };

    const PLATFORM_ICONS = {

    function flipToQR(platform, url, hint, rawData) {
      backQr.innerHTML = '';
      if (activeQR) { activeQR.clear(); activeQR = null; }

      const brand = PLATFORM_COLORS[platform] || { bg: '#FDFAF6', accent: '#A08860', alpha: 'rgba(196,168,130,0.35)' };

      // Tint the card-back background + CSS vars
      const cardBack = document.getElementById('cardBack');
      cardBack.style.setProperty('--qr-color', brand.accent);
      cardBack.style.setProperty('--qr-color-alpha', brand.alpha);
      cardBack.style.setProperty('--qr-bg', brand.bg);
      cardBack.style.background = brand.bg;

      // Platform logo
      const iconEl = document.getElementById('backPlatformIcon');
      iconEl.innerHTML = PLATFORM_ICONS[platform] || '';

      backPlatform.textContent = platform;
      backHint.textContent = hint;
      if (url) { backOpen.href = url; backOpen.style.display = ''; }
      else { backOpen.style.display = 'none'; }
      // QR dots always dark for readability
      activeQR = new QRCode(backQr, {
        text: rawData || url,
        width: 180, height: 180,
        colorDark: '#1A1A1A', colorLight: 'transparent',
        correctLevel: QRCode.CorrectLevel.M
      });
      card.classList.add('flipped');
    }

    function flipBack() {
      card.classList.remove('flipped');
      const cardBack = document.getElementById('cardBack');
      cardBack.style.background = '';
    }

    document.getElementById('backClose').addEventListener('click', (e) => { e.stopPropagation(); flipBack(); });
    document.getElementById('cardBack').addEventListener('click', flipBack);

    function bindLinkRows() {
      document.querySelectorAll('.link-row:not(.hidden)').forEach(row => {
        row.onclick = (e) => {
          if (e.target.closest('.open-link')) return;
          flipToQR(row.dataset.platform, row.querySelector('.open-link').href, row.dataset.hint);
        };
      });

    }

    // ── vCard ─────────────────────────────────────────────────────
    function buildVcard() {
      if (!currentData) return '';
      const d = currentData;
      const lines = ['BEGIN:VCARD', 'VERSION:3.0'];
      lines.push(`FN:${d.n}`);
      const parts = d.n.split(' ');
      lines.push(`N:${parts.slice(1).join(' ')};${parts[0]};;;`);
      if (d.t) lines.push(`TITLE:${d.t}`);
      if (d.pf) lines.push(`URL;type=WORK:${d.pf}`);
      if (d.li) {
        const m = d.li.match(/linkedin\.com\/in\/([^/?#]+)/);
        lines.push(`X-SOCIALPROFILE;type=linkedin;x-user=${m ? m[1] : ''}:${d.li}`);
      }
      if (d.tw) {
        const m = d.tw.match(/(?:x|twitter)\.com\/([^/?#]+)/);
        lines.push(`X-SOCIALPROFILE;type=twitter;x-user=${m ? m[1] : ''}:${d.tw}`);
      }
      if (d.ig) {
        const m = d.ig.match(/instagram\.com\/([^/?#]+)/);
        lines.push(`X-SOCIALPROFILE;type=instagram;x-user=${m ? m[1] : ''}:${d.ig}`);
      }
      if (d.t && d.l) lines.push(`NOTE:${d.t} · ${d.l}`);
      lines.push('END:VCARD');
      return lines.join('\r\n');
    }

    document.getElementById('vcardBtn').addEventListener('click', (e) => {
      const vc = buildVcard();
      if (!vc) return;
      const blob = new Blob([vc], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const slug = (currentData.n || 'contact').toLowerCase().replace(/\s+/g, '-');
      a.download = `${slug}.vcf`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('Contact file downloaded!');
    });

    // ── Toast ─────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ── Create Mode ───────────────────────────────────────────────
    const fLinkedin = document.getElementById('fLinkedin');
    const avatarPreview = document.getElementById('avatarPreview');

    fLinkedin.addEventListener('blur', () => {
      const val = fLinkedin.value.trim();
      const m = val.match(/linkedin\.com\/in\/([^/?#]+)/);
      if (m) {
        avatarPreview.innerHTML = `<img src="https://unavatar.io/linkedin/${m[1]}" alt="" onerror="this.parentElement.innerHTML=''">`;
      } else {
        avatarPreview.innerHTML = '';
      }
    });

    let generatedUrl = '';

    document.getElementById('generateBtn').addEventListener('click', () => {
      const name = document.getElementById('fName').value.trim();
      const nameInput = document.getElementById('fName');
      const nameError = document.getElementById('fNameError');

      if (!name) {
        nameInput.classList.add('error');
        nameError.classList.add('show');
        nameInput.focus();
        return;
      }
      nameInput.classList.remove('error');
      nameError.classList.remove('show');

      const data = { n: name };
      const title = document.getElementById('fTitle').value.trim();
      const tagline = document.getElementById('fTagline').value.trim();
      const loc = document.getElementById('fLocation').value.trim();
      const li = fLinkedin.value.trim();
      const tw = document.getElementById('fTwitter').value.trim();
      const ig = document.getElementById('fInstagram').value.trim();
      const pf = document.getElementById('fPortfolio').value.trim();
      const gh = document.getElementById('fGithub').value.trim();

      if (title) data.t = title;
      if (tagline) data.g = tagline;
      if (loc) data.l = loc;
      if (li) data.li = li;
      if (tw) data.tw = tw;
      if (ig) data.ig = ig;
      if (pf) data.pf = pf;
      if (gh) data.gh = gh;

      const encoded = encodeCardData(data);
      generatedUrl = `${window.location.protocol}//${window.location.host}${window.location.pathname}?d=${encoded}`;

      // Transition: form out, card in
      const createEl = document.getElementById('createMode');
      const cardScene = document.getElementById('cardScene');

      createEl.classList.add('fade-out');
      setTimeout(() => {
        createEl.classList.add('hidden');
        createEl.classList.remove('fade-out');

        renderCard(data);
        cardScene.classList.remove('hidden');
        cardScene.classList.add('fade-in');
        setTimeout(() => cardScene.classList.remove('fade-in'), 500);

        // Update browser URL without reload
        window.history.replaceState(null, '', generatedUrl);

        setFooter('preview');
      }, 350);
    });

    // ── Settings button (edit card) ──────────────────────────────
    document.getElementById('settingsBtn').addEventListener('click', () => {
      if (!currentData) return;
      populateForm(currentData);
      document.getElementById('cardScene').classList.add('hidden');
      document.getElementById('createMode').classList.remove('hidden');
      setFooter('create');
      flipBack();
    });

    // ── Copy link ─────────────────────────────────────────────────
    document.getElementById('copyLinkBtn').addEventListener('click', () => {
      copyText(window.location.href);
      showToast('Link copied!');
    });

    function copyText(text) {
      navigator.clipboard.writeText(text).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      });
    }

    function populateForm(data) {
      document.getElementById('fName').value = data.n || '';
      document.getElementById('fTitle').value = data.t || '';
      document.getElementById('fTagline').value = data.g || '';
      document.getElementById('fLocation').value = data.l || '';
      document.getElementById('fLinkedin').value = data.li || '';
      document.getElementById('fTwitter').value = data.tw || '';
      document.getElementById('fInstagram').value = data.ig || '';
      document.getElementById('fPortfolio').value = data.pf || '';
      document.getElementById('fGithub').value = data.gh || '';
      fLinkedin.dispatchEvent(new Event('blur'));
    }

    // ── Footer ────────────────────────────────────────────────────
    function setFooter(mode) {
      const footer = document.getElementById('footer');
      const baseUrl = window.location.pathname;
      if (mode === 'view') {
        footer.innerHTML = `Made with ✦ · <a href="${baseUrl}">Create yours →</a>`;
      } else if (mode === 'preview') {
        footer.innerHTML = `Made with ✦ tapcard`;
      } else {
        footer.innerHTML = `Made by Ayushi Agrawal`;
      }
    }

    // ── Init ──────────────────────────────────────────────────────
    function initApp() {
      const { mode, data } = getMode();

      if (mode === 'view') {
        document.getElementById('createMode').classList.add('hidden');
        document.getElementById('cardScene').classList.remove('hidden');
        renderCard(data);
        setFooter('view');
      } else if (mode === 'error') {
        document.getElementById('errorMode').classList.remove('hidden');
        document.getElementById('errorCreateLink').href = window.location.pathname;
        setFooter('create');
      } else {
        document.getElementById('createMode').classList.remove('hidden');
        setFooter('create');
      }
    }

    // Fix: the generate handler shadows `location` with the form variable
    // Already handled by using window.location explicitly in generatedUrl

    initApp();
  </script>
</body>
